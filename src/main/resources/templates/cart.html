<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart - Step 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body>
<div class="container my-4">

    <div th:if="${errorMessage != null}" class="mb-3">
        <div class="alert alert-danger" th:text="${errorMessage}"></div>
    </div>
    <div th:if="${successMessage != null}" class="mb-3">
        <div class="alert alert-success" th:text="${successMessage}"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="mb-0">Step 1 of 3 - Shopping Cart</h2>
        </div>
        <div class="card-body">

            <h5>Products in your cart</h5>

            <div class="table-responsive">
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th class="text-end">Unit price</th>
                        <th class="text-end">Quantity</th>
                        <th class="text-end">Subtotal</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${cartItems}">
                        <td th:text="${p.productName}">Product name</td>
                        <td class="text-end" th:text="${p.unitPrice} + ' €'">0.00 €</td>
                        <td class="text-end" th:text="${p.quantity}">1</td>
                        <td class="text-end" th:text="${p.lineTotal} + ' €'">0.00 €</td>
                        <td>
                            <div class="btn-group" role="group">
                                <form th:action="@{/cart/dec/{id}(id=${p.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary">-</button>
                                </form>
                                <form th:action="@{/cart/inc/{id}(id=${p.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary">+</button>
                                </form>
                                <form th:action="@{/cart/remove/{id}(id=${p.id})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(cartItems)}">
                        <td colspan="5">Your cart is empty</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <hr />

            <h5>Add product from catalog:</h5>
            <form th:action="@{/cart/addproduct}" th:object="${productAddDTO}" method="post" class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label for="productSelect" class="form-label">Product</label>
                    <select id="productSelect" th:field="*{productId}" class="form-select" required>
                        <option value="">-- Select product --</option>
                        <option th:each="prod : ${products}" th:value="${prod.id}" th:text="${prod.name + ' - ' + #numbers.formatDecimal(prod.price, 1, 'COMMA', 2, 'POINT') + ' €'}"></option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('productId')}" th:errors="*{productId}"></div>
                </div>
                <div class="col-auto">
                    <label for="quantityInput" class="form-label">Quantity</label>
                    <input id="quantityInput" type="number" th:field="*{quantity}" class="form-control" min="1" />
                    <div class="text-danger small mt-1" id="quantityError" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>

            <hr />

            <h5>Discount coupon:</h5>
            <form th:action="@{/cart/applycoupon}" method="post" class="row g-2 align-items-center">
                <div class="col-auto">
                    <label for="couponCode" class="visually-hidden">Coupon</label>
                    <input type="text" id="couponCode" name="couponCode" class="form-control" placeholder="Coupon code" />
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-secondary">Apply</button>
                </div>
                <div class="col-12 mt-2" th:if="${cart.appliedCoupon != null}">
                    <strong>Applied coupon:</strong> <span th:text="${cart.appliedCoupon.code}"></span> &nbsp; → &nbsp; <span th:text="${#numbers.formatDecimal(cart.couponDiscount, 1, 'COMMA', 2, 'POINT')} + ' €'"></span>
                </div>
            </form>

            <div class="mt-4">
                <div class="row">
                    <div class="col-md-6">
                        <div>Gross total: <strong th:text="${#numbers.formatDecimal(grossTotal, 1, 'COMMA', 2, 'POINT')} + ' €'"></strong></div>
                        <div>Coupon discount: <strong th:text="${#numbers.formatDecimal(couponDiscount, 1, 'COMMA', 2, 'POINT')} + ' €'"></strong></div>
                        <div>Total to pay: <strong th:text="${#numbers.formatDecimal(finalTotal, 1, 'COMMA', 2, 'POINT')} + ' €'" class="fs-5"></strong></div>
                    </div>
                    <div class="col-md-6 text-end">
                        <form th:action="@{/cart/checkout}" method="post">
                            <button type="submit" class="btn btn-success">Continue to Step 2 & Create Order</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
