<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order confirmation</title>
</head>
<body>
<div th:if="${errorMessage != null}">
    <div style="color:red; font-weight:bold;" th:text="${errorMessage}"></div>
</div>
<div th:if="${successMessage != null}">
    <div style="color:green; font-weight:bold;" th:text="${successMessage}"></div>
</div>

<h1>Order completed</h1>
<div th:if="${order} != null">
    <p>Thank you for your purchase!</p>
    <p>Order number: <strong th:text="${order.orderNumber}">ORD-123</strong></p>
    <p>Amount: <strong th:text="${order.finalTotal}">0.00</strong></p>
    <p>Payment method: <strong th:text="${order.paymentMethod}">CARD</strong></p>
    <p>Payment status: <strong th:text="${order.paymentStatus}">PAID</strong></p>
    <p>Payment details: <span th:text="${order.paymentDetails}">details</span></p>
    <p>A confirmation email has been sent to you.</p>
</div>
<p><a th:href="@{/cart}">Back to cart</a></p>
</body>
</html>
