<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8" />
    <title>Step 3 of 3 - Payment Method and Confirmation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>
<body>
<div class="container my-4">

    <div th:if="${errorMessage != null}" class="mb-3">
        <div class="alert alert-danger" th:text="${errorMessage}"></div>
    </div>
    <div th:if="${successMessage != null}" class="mb-3">
        <div class="alert alert-success" th:text="${successMessage}"></div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 class="mb-0">Step 3 of 3 - Payment Method and Confirmation</h2>
        </div>
        <div class="card-body">

            <h5>Order summary</h5>
            <div th:if="${order != null}" class="mb-3">
                <ul>
                    <li th:each="it : ${order.orderItems}" th:text="${it.productName} + ' (x' + ${it.quantity} + ') = ' + ${it.lineTotal}">Item</li>
                </ul>
                <div>Gross total: <span th:text="${order.grossTotal}">0.00</span></div>
                <div>Coupon discount: <span th:text="${order.discountTotal}">0.00</span></div>
                <div>Total to pay: <strong th:text="${order.finalTotal}">0.00</strong></div>
            </div>

            <form th:action="@{/checkout/step3}" method="post" th:object="${paymentDTO}">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <h5>Payment method</h5>

                    <div class="mb-2 form-check">
                        <input class="form-check-input" type="radio" th:field="*{paymentMethod}" id="payCard" value="CARD">
                        <label class="form-check-label" for="payCard">Card</label>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-md-6">
                            <label for="cardNumber" class="form-label">Card number</label>
                            <input id="cardNumber" type="text" th:field="*{cardNumber}" class="form-control" />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cardNumber')}" th:errors="*{cardNumber}"></div>
                        </div>
                        <div class="col-md-3">
                            <label for="expiry" class="form-label">Expiry (MM/YY)</label>
                            <input id="expiry" type="text" th:field="*{expiry}" class="form-control" />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('expiry')}" th:errors="*{expiry}"></div>
                        </div>
                        <div class="col-md-3">
                            <label for="cvv" class="form-label">CVV</label>
                            <input id="cvv" type="text" th:field="*{cvv}" class="form-control" />
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cvv')}" th:errors="*{cvv}"></div>
                        </div>
                    </div>

                    <div class="mb-2 form-check">
                        <input class="form-check-input" type="radio" th:field="*{paymentMethod}" id="payPaypal" value="PAYPAL">
                        <label class="form-check-label" for="payPaypal">PayPal</label>
                    </div>
                    <div class="mb-3">
                        <label for="paypalEmail" class="form-label">PayPal email</label>
                        <input id="paypalEmail" type="text" th:field="*{paypalEmail}" class="form-control" />
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('paypalEmail')}" th:errors="*{paypalEmail}"></div>
                    </div>

                    <div class="mb-2 form-check">
                        <input class="form-check-input" type="radio" th:field="*{paymentMethod}" id="payBank" value="BANK">
                        <label class="form-check-label" for="payBank">Bank transfer</label>
                    </div>
                    <div class="mb-3">
                        <p>IBAN: ES00 1234 5678 9000 0000 0000</p>
                        <p class="text-muted">(Order will be marked as PENDING until payment is received)</p>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a class="btn btn-secondary" th:href="@{/checkout/step2(orderId=${paymentDTO.id})}">« Back to addresses</a>
                    <button type="submit" class="btn btn-primary">Confirm payment »</button>
                </div>

            </form>

        </div>
    </div>

</div>
</body>
</html>
